<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chibrary Komik Digital - UAS Web 2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.js"></script>
    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
    <!-- Tambahan Google Fonts untuk memperkuat kesan retro -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .retro-title { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#fcf8f2] text-stone-800 min-h-screen antialiased">

    <div id="app">
        <nav class="bg-red-700 p-4 text-amber-50 shadow-md border-b-4 border-red-900 sticky top-0 z-50">
            <div class="container mx-auto max-w-6xl flex justify-between items-center">
                
                <h1 class="text-2xl font-black tracking-wide flex items-center gap-2 retro-title italic">
                    <span>🕮</span> <span>Chibrary</span>
                </h1>
                
                <div class="space-x-4 font-semibold flex items-center text-sm tracking-wide">
                    <router-link to="/" class="hover:text-amber-200 transition py-1">Katalog</router-link>
                    
                    <router-link v-if="isLoggedIn" to="/dashboard" class="hover:text-amber-200 transition py-1">Dashboard Admin</router-link>
                    
                    <button v-if="isLoggedIn" @click="logout" class="bg-amber-500 hover:bg-amber-600 text-stone-900 px-4 py-2 rounded-lg transition shadow-md font-bold border border-amber-600">
                        Logout
                    </button>
                    <router-link v-else to="/login" class="bg-amber-50 text-red-700 hover:bg-amber-100 px-4 py-2 rounded-lg transition shadow-md font-bold border-2 border-red-900">
                        Login Admin
                    </router-link>
                </div>

            </div>
        </nav>

        <main class="container mx-auto p-4 md:p-6">
            <router-view></router-view>
        </main>
    </div>

    <script src="app.js" type="module"></script>
</body>
</html>
